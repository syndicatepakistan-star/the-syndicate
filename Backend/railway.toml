# Backend service: Root Directory = `Backend`. Connect GitHub → deploys on every git push.
# releaseCommand + startCommand run automatically (leave Custom Start Command empty in Railway UI).
# Default: migrate, collectstatic, load program playlists if DB empty (AUTO_LOAD_STREAM_FIXTURE in nixpacks.toml).

[build]
builder = "NIXPACKS"

[deploy]
# Auto start (clear Custom Start Command in Railway UI for this service).
startCommand = "sh railway_start.sh"
# Migrations + collectstatic before each deploy.
releaseCommand = "sh railway_start.sh --release"
healthcheckPath = "/admin/login/"
healthcheckTimeout = 120
