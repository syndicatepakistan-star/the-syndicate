# Backend service: set Railway "Root Directory" to `Backend` (match repo folder name).
# Add PostgreSQL to this service — Railway sets DATABASE_URL; run migrate via releaseCommand.
# Clear any custom Start Command in Railway UI so this (or nixpacks [start]) is used.

[build]
builder = "NIXPACKS"

[deploy]
# Auto start (clear Custom Start Command in Railway UI for this service).
startCommand = "sh railway_start.sh"
# Migrations + collectstatic before each deploy.
releaseCommand = "sh railway_start.sh --release"
healthcheckPath = "/admin/login/"
healthcheckTimeout = 120
